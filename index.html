<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width,
                 initial-scale=1.0" />

    <title>Memory Game</title>

    <link
        rel="stylesheet"
        href="style.css" />
</head>

<body>

    <div class="game-container">

        <h1>Memory Game</h1>

        <div class="controls">

            <!-- Grid Size Picker -->
            <div class="picker-wrapper" id="size-picker-wrapper">
                <button class="picker-trigger" id="size-trigger">
                    Grid: 4×4 ▾
                </button>
                <div class="picker-panel hidden" id="size-panel">
                    <div class="size-grid">
                        <button class="size-option selected" data-size="4x4"
                            data-cols="4" data-rows="4">4×4</button>
                        <button class="size-option" data-size="4x5"
                            data-cols="4" data-rows="5">4×5</button>
                        <button class="size-option" data-size="4x6"
                            data-cols="4" data-rows="6">4×6</button>
                        <button class="size-option" data-size="5x6"
                            data-cols="5" data-rows="6">5×6</button>
                    </div>
                    <!-- Dot grid preview -->
                    <div class="dot-grid-preview" id="dot-grid-preview"></div>
                </div>
            </div>

            <!-- Deck Picker -->
            <div class="picker-wrapper" id="theme-picker-wrapper">
                <button class="picker-trigger" id="theme-trigger">
                    Deck: Origami ▾
                </button>
                <div class="picker-panel hidden" id="theme-panel">
                    <div class="theme-swatches">
                        <div class="theme-swatch selected" data-theme="origami">
                            <img src="images/origami/origami-00-cardback.png" alt="Origami">
                            <span>Origami</span>
                        </div>
                        <div class="theme-swatch" data-theme="flowers">
                            <img src="images/flowers/flowers-00-cardback.png" alt="Flowers">
                            <span>Flowers</span>
                        </div>
                        <div class="theme-swatch" data-theme="shapes">
                            <img src="images/shapes/shapes-00-cardback.png" alt="Shapes">
                            <span>Shapes</span>
                        </div>
                    </div>
                </div>
            </div>

            <button id="new-game-button">
                Start Game
            </button>

        </div>

        <div class="stats">

            <span>
                Moves:
                <span id="move-counter">
                    0
                </span>
            </span>

            <span>
                ⏱ Time:
                <span id="timer">
                    00:00
                </span>
            </span>

        </div>

        <div
            id="game-board"
            class="game-board">
        </div>

        <div
            id="win-modal"
            class="modal hidden">

            <div class="modal-content">

                <h2>
                    Puzzle Complete!
                </h2>

                <p id="modal-stats">
                </p>

                <button
                    id="close-modal">
                    Close
                </button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
